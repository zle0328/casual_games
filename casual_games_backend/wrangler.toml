name = "casual-games-backend"
main = "src/index.ts"
compatibility_date = "2024-11-27"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "casual-games-db"
database_id = "" # 部署后填写

# KV 存储绑定（词条库）
[[kv_namespaces]]
binding = "KV"
id = "" # 部署后填写
preview_id = "" # 开发环境

# CORS 配置
[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }
